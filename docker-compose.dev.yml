services:
  mongo:
    image: mongo:7
    container_name: playbook-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - pb-mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: playbook-azurite
    restart: unless-stopped
    command:
      - azurite
      - --blobHost
      - 0.0.0.0
      - --queueHost
      - 0.0.0.0
      - --tableHost
      - 0.0.0.0
      - --location
      - /data
      - --skipApiVersionCheck
    ports:
      - "10000:10000"   # blob
      - "10001:10001"   # queue
      - "10002:10002"   # table
    volumes:
      - pb-azurite:/data

volumes:
  pb-mongo:
  pb-azurite:
